<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio Password - Smart Warehouse</title>
    <link rel="stylesheet" href="stile.css">
</head>
<body>

<form id="form-cambio" autocomplete="off">

    <h2>Cambio Password</h2>
    <p class="subtitle">Inserisci i dati per aggiornare la password</p>

    <div id="msg-errore" class="error-msg"></div>
    <div id="msg-successo" class="success-msg"></div>

    <input type="text" id="username" placeholder="Username" required />
    <input type="password" id="vecchia-password" placeholder="Password attuale" required />

    <div class="input-wrapper password-wrapper">
        <input type="password" id="nuova-password" placeholder="Nuova password" required />
        <button type="button" class="toggle-password" onclick="toggleNuova()">👁</button>
    </div>

    <div class="input-wrapper password-wrapper">
        <input type="password" id="conferma-password" placeholder="Conferma nuova password" required />
        <button type="button" class="toggle-password" onclick="toggleConferma()">👁</button>
    </div>

    <input type="submit" value="Aggiorna Password" id="btn-submit" />

    <p class="link-cambio-password">
        <a href="/login.html">← Torna al login</a>
    </p>

</form>

<script>
    function toggleNuova() {
        const input = document.getElementById('nuova-password');
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function toggleConferma() {
        const input = document.getElementById('conferma-password');
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('form-cambio').addEventListener('submit', async function (e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const vecchia_password = document.getElementById('vecchia-password').value;
        const nuova_password = document.getElementById('nuova-password').value;
        const conferma_password = document.getElementById('conferma-password').value;

        const msgErrore = document.getElementById('msg-errore');
        const msgSuccesso = document.getElementById('msg-successo');

        msgErrore.style.display = 'none';
        msgSuccesso.style.display = 'none';

        // controlla che le due password coincidano
        if (nuova_password !== conferma_password) {
            msgErrore.textContent = 'La nuova password e la conferma non coincidono.';
            msgErrore.style.display = 'block';
            return;
        }

        // controlla che la nuova password sia diversa dalla vecchia
        if (nuova_password === vecchia_password) {
            msgErrore.textContent = 'La nuova password deve essere diversa da quella attuale.';
            msgErrore.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api/password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, vecchia_password, nuova_password })
            });

            const dati = await res.json();

            if (res.ok) {
                msgSuccesso.textContent = dati.messaggio + ' Verrai reindirizzato al login...';
                msgSuccesso.style.display = 'block';
                setTimeout(() => { location.href = '/login.html'; }, 2500);
            } else {
                msgErrore.textContent = dati.errore;
                msgErrore.style.display = 'block';
            }
        } catch (e) {
            msgErrore.textContent = 'Errore di connessione al server.';
            msgErrore.style.display = 'block';
        }
    });
</script>

</body>
</html>
